{% extends 'base.html' %}{% block content %}<script>window.TABLE_KIND='users'</script><div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4"><div><h1 class="page-title">Gestión TI</h1><p class="small text-muted mb-0"><i>Base conectada: {{ db_path }}</i></p></div><div class="d-flex gap-2"><button class="btn btn-danger rounded-pill" onclick="deleteSelectedUser()"><i class="bi bi-trash3-fill me-1"></i>Eliminar TI</button><button class="btn btn-success rounded-pill" data-bs-toggle="modal" data-bs-target="#userModal"><i class="bi bi-person-plus-fill me-1"></i>Agregar TI</button></div></div><div class="card border-0 shadow-sm"><div class="card-body"><div class="input-group mb-3"><span class="input-group-text"><i class="bi bi-search"></i></span><input id="search" class="form-control" placeholder="Buscar TI..." oninput="loadTable()"></div><div class="table-responsive"><table id="data-table" class="table table-hover align-middle"></table></div></div></div><div class="modal fade" id="userModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header"><h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Agregar nuevo TI</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><label class="form-label">ID de Telegram</label><input id="newTelegramId" class="form-control mb-3" placeholder="Ej: 123456789"><label class="form-label">Nombre / Usuario opcional</label><input id="newTiName" class="form-control" placeholder="Ej: Cristian"></div><div class="modal-footer"><button class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button><button class="btn btn-success" onclick="addUserFromForm()">Guardar</button></div></div></div></div>{% endblock %}
