{% extends 'base.html' %}{% block content %}
<script>
  window.LAUNCHER = true;
</script>
<div class="page-head">
  <a href="/home" class="btn btn-light rounded-circle shadow-sm"
    ><i class="bi bi-arrow-left"></i
  ></a>
  <div>
    <h1>TI-Bot Launcher</h1>
    <p>Controla Webhook, Worker y Ngrok desde el servidor.</p>
  </div>
</div>
<div class="row g-4 justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-3">Estado de servicios</h5>
        <div class="service-list">
          <div class="service-row">
            <span
              ><i class="bi bi-globe2 me-2"></i>Webhook
              <b id="s-webhook">...</b></span
            ><button class="form-switch-btn" data-service="webhook"></button>
          </div>
          <div class="service-row">
            <span
              ><i class="bi bi-cpu me-2"></i>Worker
              <b id="s-worker">...</b></span
            ><button class="form-switch-btn" data-service="worker"></button>
          </div>
          <div class="service-row">
            <span
              ><i class="bi bi-broadcast-pin me-2"></i>Ngrok
              <b id="s-ngrok">...</b></span
            ><button class="form-switch-btn" data-service="ngrok"></button>
          </div>
          <hr />
          <div class="service-row">
            <span><i class="bi bi-lightning-charge-fill me-2"></i>Todos</span
            ><button class="form-switch-btn" data-service="all"></button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
