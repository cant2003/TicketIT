{% extends 'base.html' %}

{% block content %}

<script>
window.LOGS_PAGE = true;
</script>

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2 class="fw-bold mb-1">Logs del Sistema</h2>
        <p class="text-muted mb-0">Terminales de Webhook, Worker, Ngrok y Panel</p>
    </div>

    <a href="/home" class="btn btn-outline-primary rounded-pill">
        <i class="bi bi-arrow-left me-1"></i>
        Volver
    </a>
</div>

<div class="accordion shadow-sm" id="logsAccordion">

    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#workerLogBox">
                <i class="bi bi-cpu me-2"></i>
                Worker
            </button>
        </h2>
        <div id="workerLogBox" class="accordion-collapse collapse show" data-bs-parent="#logsAccordion">
            <div class="accordion-body">
                <pre id="log-worker" class="log-terminal">Cargando...</pre>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#webhookLogBox">
                <i class="bi bi-diagram-3 me-2"></i>
                Webhook
            </button>
        </h2>
        <div id="webhookLogBox" class="accordion-collapse collapse" data-bs-parent="#logsAccordion">
            <div class="accordion-body">
                <pre id="log-webhook" class="log-terminal">Cargando...</pre>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#ngrokLogBox">
                <i class="bi bi-globe2 me-2"></i>
                Ngrok
            </button>
        </h2>
        <div id="ngrokLogBox" class="accordion-collapse collapse" data-bs-parent="#logsAccordion">
            <div class="accordion-body">
                <pre id="log-ngrok" class="log-terminal">Cargando...</pre>
            </div>
        </div>
    </div>

    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed fw-bold" type="button" data-bs-toggle="collapse" data-bs-target="#panelLogBox">
                <i class="bi bi-window me-2"></i>
                Panel
            </button>
        </h2>
        <div id="panelLogBox" class="accordion-collapse collapse" data-bs-parent="#logsAccordion">
            <div class="accordion-body">
                <pre id="log-panel" class="log-terminal">Cargando...</pre>
            </div>
        </div>
    </div>

</div>

{% endblock %}
