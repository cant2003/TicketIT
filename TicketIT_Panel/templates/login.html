{% extends 'base.html' %}{% block content %}
<section class="login-wrap">
  <div class="card login-card border-0">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <div class="login-icon"><i class="bi bi-shield-lock-fill"></i></div>
        <h1 class="h2 fw-bold mt-3">Bienvenido</h1>
        <p class="text-muted mb-0">Ingresa tu ID de Telegram autorizado</p>
      </div>
      <form method="post">
        <label class="form-label fw-semibold">Acceso</label>
        <div class="input-group input-group-lg mb-3">
          <span class="input-group-text"><i class="bi bi-telegram"></i></span
          ><input
            name="telegram_id"
            class="form-control"
            placeholder="Ej: 123456789"
            autofocus
            required
          />
        </div>
        <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar</button
        >{% if error %}
        <div class="alert alert-danger mt-4 text-center mb-0">
          <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
        </div>
        {% endif %}
      </form>
    </div>
  </div>
</section>
{% endblock %}
