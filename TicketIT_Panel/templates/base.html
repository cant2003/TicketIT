<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TicketIT</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg app-nav">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="/home"
          ><i class="bi bi-ticket-perforated-fill me-2"></i>TicketIT</a
        >{% if session.telegram_id %}<button
          class="btn btn-sm btn-danger rounded-pill px-3"
          onclick="confirmLogout()"
        >
          <i class="bi bi-box-arrow-right me-1"></i>Salir</button
        >{% endif %}
      </div>
    </nav>
    <main class="container-fluid px-4 py-4">
      {% block content %}{% endblock %}
    </main>
    <div
      id="toasts"
      class="toast-container position-fixed bottom-0 end-0 p-3"
    ></div>
    <div class="modal fade" id="confirmModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="confirmTitle">Confirmar</h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body" id="confirmBody">¿Confirmas la acción?</div>
          <div class="modal-footer">
            <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
              Cancelar</button
            ><button class="btn btn-primary" id="confirmOk">Confirmar</button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
